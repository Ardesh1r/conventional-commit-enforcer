<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="redBorder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f85149" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f85149" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="greenBorder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- Subtle section dividers -->
  <line x1="0" y1="98" x2="1200" y2="98" stroke="#21262d" stroke-width="1"/>
  <line x1="0" y1="350" x2="1200" y2="350" stroke="#21262d" stroke-width="1"/>

  <!-- ===================== HEADER ===================== -->

  <!-- Logo ring + checkmark, centered -->
  <circle cx="432" cy="48" r="17" fill="#238636" fill-opacity="0.15"/>
  <circle cx="432" cy="48" r="17" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <polyline points="424,49 430,55 442,40" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="460" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="25" font-weight="700" fill="#e6edf3">Conventional Commit Enforcer</text>

  <!-- GitHub Action pill -->
  <rect x="460" y="62" width="122" height="20" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="521" y="76" font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">GitHub Action</text>

  <!-- Subtitle, centered -->
  <text x="600" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6e7681" text-anchor="middle">Stop bad commit messages before they merge — with inline PR comments and zero configuration</text>

  <!-- ===================== LEFT PANEL — BAD ===================== -->

  <rect x="40" y="112" width="490" height="225" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Red left accent -->
  <rect x="40" y="112" width="3" height="225" rx="1.5" fill="url(#redBorder)"/>
  <!-- Title bar -->
  <rect x="40" y="112" width="490" height="36" rx="8" fill="#21262d"/>
  <rect x="40" y="128" width="490" height="20" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="64" cy="130" r="5" fill="#f85149"/>
  <circle cx="82" cy="130" r="5" fill="#e3b341" opacity="0.5"/>
  <circle cx="100" cy="130" r="5" fill="#3fb950" opacity="0.4"/>
  <!-- Tab text -->
  <text x="118" y="135" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="12" fill="#6e7681">commit-check</text>
  <!-- FAIL badge -->
  <rect x="442" y="119" width="74" height="20" rx="4" fill="#21262d" stroke="#f85149" stroke-width="1"/>
  <text x="479" y="133" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#f85149" text-anchor="middle" font-weight="700">✕  FAIL</text>

  <!-- Row 1 -->
  <rect x="52" y="160" width="466" height="26" rx="3" fill="#0d1117" fill-opacity="0.5"/>
  <line x1="70" y1="168" x2="78" y2="176" stroke="#f85149" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="78" y1="168" x2="70" y2="176" stroke="#f85149" stroke-width="1.8" stroke-linecap="round"/>
  <text x="94" y="178" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#58a6ff">a1b2c3d</text>
  <text x="160" y="178" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c9d1d9">"updated stuff"</text>
  <text x="505" y="178" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#f8514970" text-anchor="end">no type</text>

  <!-- Row 2 -->
  <line x1="70" y1="197" x2="78" y2="205" stroke="#f85149" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="78" y1="197" x2="70" y2="205" stroke="#f85149" stroke-width="1.8" stroke-linecap="round"/>
  <text x="94" y="207" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#58a6ff">d4e5f6a</text>
  <text x="160" y="207" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c9d1d9">"WIP"</text>
  <text x="505" y="207" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#f8514970" text-anchor="end">no type</text>

  <!-- Row 3 -->
  <line x1="70" y1="226" x2="78" y2="234" stroke="#f85149" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="78" y1="226" x2="70" y2="234" stroke="#f85149" stroke-width="1.8" stroke-linecap="round"/>
  <text x="94" y="236" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#58a6ff">b7c8d9e</text>
  <text x="160" y="236" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c9d1d9">"fix stuff"</text>
  <text x="505" y="236" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#f8514970" text-anchor="end">no type</text>

  <!-- Error box -->
  <rect x="52" y="254" width="466" height="72" rx="6" fill="#21262d" stroke="#f8514920" stroke-width="1"/>
  <rect x="52" y="254" width="3" height="72" rx="1.5" fill="#f85149" fill-opacity="0.8"/>
  <text x="68" y="272" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#f85149">3 commit(s) violate Conventional Commits spec</text>
  <text x="68" y="292" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#6e7681">Expected: feat: ..., fix(scope): ..., chore!: ...</text>
  <text x="68" y="312" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#6e7681">Merge blocked. Fix commits and re-push.</text>

  <!-- ===================== CENTER ARROW ===================== -->

  <line x1="548" y1="225" x2="635" y2="225" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polyline points="626,218 638,225 626,232" fill="none" stroke="#3fb950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="591" y="213" font-family="-apple-system,sans-serif" font-size="10" fill="#484f58" text-anchor="middle">with action</text>

  <!-- ===================== RIGHT PANEL — GOOD ===================== -->

  <rect x="670" y="112" width="490" height="225" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Green right accent -->
  <rect x="1157" y="112" width="3" height="225" rx="1.5" fill="url(#greenBorder)"/>
  <!-- Title bar -->
  <rect x="670" y="112" width="490" height="36" rx="8" fill="#21262d"/>
  <rect x="670" y="128" width="490" height="20" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="694" cy="130" r="5" fill="#f85149" opacity="0.4"/>
  <circle cx="712" cy="130" r="5" fill="#e3b341" opacity="0.5"/>
  <circle cx="730" cy="130" r="5" fill="#3fb950"/>
  <!-- Tab text -->
  <text x="748" y="135" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="12" fill="#6e7681">commit-check</text>
  <!-- PASS badge -->
  <rect x="1072" y="119" width="74" height="20" rx="4" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
  <text x="1109" y="133" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="700">✓  PASS</text>

  <!-- Row 1 -->
  <rect x="682" y="160" width="466" height="26" rx="3" fill="#0d1117" fill-opacity="0.5"/>
  <polyline points="672,169 677,175 687,163" fill="none" stroke="#3fb950" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="698" y="178" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#58a6ff">a1b2c3d</text>
  <text x="764" y="178" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c9d1d9"><tspan fill="#3fb950">feat</tspan>: add user login page</text>

  <!-- Row 2 -->
  <polyline points="672,198 677,204 687,192" fill="none" stroke="#3fb950" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="698" y="207" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#58a6ff">d4e5f6a</text>
  <text x="764" y="207" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c9d1d9"><tspan fill="#f85149">fix</tspan><tspan fill="#58a6ff">(auth)</tspan>: handle token expiry</text>

  <!-- Row 3 -->
  <polyline points="672,227 677,233 687,221" fill="none" stroke="#3fb950" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="698" y="236" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#58a6ff">b7c8d9e</text>
  <text x="764" y="236" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c9d1d9"><tspan fill="#e3b341">chore</tspan>: update dependencies</text>

  <!-- Success box -->
  <rect x="682" y="254" width="466" height="72" rx="6" fill="#21262d" stroke="#3fb95020" stroke-width="1"/>
  <rect x="682" y="254" width="3" height="72" rx="1.5" fill="#3fb950" fill-opacity="0.8"/>
  <text x="698" y="272" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#3fb950">All 3 commit(s) follow Conventional Commits spec</text>
  <text x="698" y="292" font-family="'SF Mono',Consolas,monospace" font-size="10" fill="#6e7681">PR is clear to merge.</text>

  <!-- ===================== BOTTOM PILLS ===================== -->

  <rect x="243" y="362" width="148" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="317" y="378" font-family="-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Inline PR Comments</text>

  <rect x="405" y="362" width="108" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="459" y="378" font-family="-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Zero Config</text>

  <rect x="527" y="362" width="148" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="601" y="378" font-family="-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">push + pull_request</text>

  <rect x="689" y="362" width="108" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="743" y="378" font-family="-apple-system,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">MIT License</text>

  <rect x="811" y="362" width="148" height="24" rx="12" fill="#21262d" stroke="#3fb95040" stroke-width="1"/>
  <text x="885" y="378" font-family="-apple-system,sans-serif" font-size="11" fill="#3fb950" text-anchor="middle">20 Tests Passing</text>
</svg>
