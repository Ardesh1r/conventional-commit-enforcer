<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#238636"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#21262d" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#21262d" stroke-width="1"/>

  <!-- Outer ring -->
  <circle cx="200" cy="170" r="82" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.3"/>

  <!-- Green circle -->
  <circle cx="200" cy="170" r="68" fill="#238636" opacity="0.15"/>
  <circle cx="200" cy="170" r="68" fill="none" stroke="url(#ring)" stroke-width="3" filter="url(#glow)"/>

  <!-- Checkmark -->
  <polyline
    points="168,170 188,192 232,148"
    fill="none"
    stroke="#3fb950"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Bottom label: conventional commit format -->
  <rect x="60" y="268" width="280" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text
    x="200"
    y="296"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="18"
    text-anchor="middle"
    fill="#8b949e"
    letter-spacing="0.5"
  >
    <tspan fill="#3fb950">feat</tspan>
    <tspan fill="#58a6ff">(scope)</tspan>
    <tspan fill="#c9d1d9">: description</tspan>
  </text>

  <!-- Title -->
  <text
    x="200"
    y="344"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="500"
    text-anchor="middle"
    fill="#484f58"
    letter-spacing="1.5"
  >CONVENTIONAL COMMIT ENFORCER</text>
</svg>
